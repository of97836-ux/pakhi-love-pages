<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ritu ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(-45deg,#ff4d6d,#ff758c,#ff7eb3,#ffb3c6);
background-size: 400% 400%;
animation: bg 10s ease infinite;
}

/* background animation */
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.card{
width:90%;
max-width:700px;
padding:30px;
text-align:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:25px;
color:white;
box-shadow:0 0 30px rgba(0,0,0,0.3);
position:relative;
z-index:2;
}

img{
width:180px;
height:180px;
object-fit:cover;
border-radius:50%;
border:4px solid white;
margin:15px 0;
box-shadow:0 0 20px rgba(255,255,255,0.4);
}

h1{
font-size:2.3rem;
margin-bottom:10px;
}

#typing{
font-size:1.3rem;
font-weight:bold;
margin-bottom:15px;
}

p{
line-height:1.7;
font-size:1.05rem;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
font-weight:bold;
cursor:pointer;
font-size:1rem;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#secret{
display:none;
margin-top:20px;
font-size:1.1rem;
}

/* HEART RAIN */
.heart{
position:absolute;
top:-10px;
color:#fff;
font-size:20px;
animation: fall linear infinite;
opacity:0.8;
}

@keyframes fall{
0%{
transform:translateY(-10vh) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}
</style>
</head>

<body>

<div class="card">

<h1>Happy Birthday, Ritu ❤️</h1>

<img src="ritu_pakhi.jpeg" alt="Ritu">

<h2 id="typing"></h2>

<p>
Amar Pakhi (Ritu) 🕊️,<br><br>

Happy Birthday My Girl 🎂❤️<br><br>

Tumi amar life er best feeling ✨<br>
Tomar jonno shob shomoy doa thakbe ❤️<br><br>

I promise, amar bhalobasha shob shomoy thakbe 🤍
</p>

<button onclick="showLove()">Click Here Pakhi 💌</button>

<div id="secret">
💖 Tumi amar shob kichu...<br>
Forever with you ❤️🕊️
</div>

</div>

<script>
function showLove(){
document.getElementById("secret").style.display="block";
}

/* typing effect */
let text = "I Love You Ritu ❤️";
let i = 0;

function type(){
if(i < text.length){
document.getElementById("typing").innerHTML += text[i];
i++;
setTimeout(type,100);
}
}
type();

/* HEART RAIN */
function createHeart(){
let heart = document.createElement("div");
heart.className = "heart";
heart.innerHTML = "❤️";

heart.style.left = Math.random() * 100 + "vw";
heart.style.fontSize = (15 + Math.random() * 20) + "px";
heart.style.animationDuration = (3 + Math.random() * 5) + "s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);
}

setInterval(createHeart,200);
</script>

</body>
</html>
