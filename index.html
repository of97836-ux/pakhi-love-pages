<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ritu ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;

/* NEW COOL NIGHT GRADIENT */
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* soft moving glow */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
animation: move 8s linear infinite;
}

@keyframes move{
0%{transform:translate(0,0);}
50%{transform:translate(-10%,-10%);}
100%{transform:translate(0,0);}
}

.card{
width:90%;
max-width:650px;
padding:30px;
text-align:center;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border-radius:20px;
color:#ffffff;
box-shadow:0 0 25px rgba(0,0,0,0.4);
position:relative;
z-index:2;
}

img{
width:170px;
height:170px;
object-fit:cover;
border-radius:50%;
border:3px solid rgba(255,255,255,0.6);
margin:15px 0;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
font-size:2.2rem;
margin-bottom:10px;
}

#typing{
font-size:1.2rem;
font-weight:bold;
margin-bottom:15px;
color:#a8dadc;
}

p{
line-height:1.7;
font-size:1rem;
color:#e6e6e6;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#ffffff;
color:#1b4965;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

#secret{
display:none;
margin-top:20px;
font-size:1.1rem;
color:#a8dadc;
}

/* HEART RAIN (BLUE WHITE STYLE) */
.heart{
position:absolute;
top:-10px;
font-size:18px;
color:#ffffff;
opacity:0.8;
animation: fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<div class="card">

<h1>Happy Birthday, Ritu ❤️</h1>

<img src="ritu.jpg" alt="Ritu">

<h2 id="typing"></h2>

<p>
Amar Pakhi (Ritu) 🕊️,<br><br>

You are my calm in chaos 🌙<br>
My favorite person in this world ❤️<br><br>

Jiboner protita din tumi special ✨<br>
Stay happy, stay mine (forever) 🤍
</p>

<button onclick="showLove()">Click Here 💌</button>

<div id="secret">
💙 You are not just a name in my life...<br>
You are my feeling, my peace, my everything.
</div>

</div>

<script>
function showLove(){
document.getElementById("secret").style.display="block";
}

/* typing effect */
let text = "I Love You Ritu ❤️";
let i = 0;

function type(){
if(i < text.length){
document.getElementById("typing").innerHTML += text[i];
i++;
setTimeout(type,100);
}
}
type();

/* heart rain */
function createHeart(){
let heart = document.createElement("div");
heart.className = "heart";
heart.innerHTML = "🤍";

heart.style.left = Math.random()*100 + "vw";
heart.style.fontSize = (12 + Math.random()*18) + "px";
heart.style.animationDuration = (3 + Math.random()*5) + "s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);
}

setInterval(createHeart,250);
</script>

</body>
</html>
